services:
  sentinel-bot:
    build: .
    container_name: sentinel-bot
    restart: always
    command: python3 main.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
      - sentinel_state:/app/state
    mem_limit: 1200m
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/state/sentinel_bot_last_cycle'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<1980 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  telegram-bot:
    build: .
    container_name: telegram-bot
    restart: always
    command: python3 telegram_bot_secure_runner.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
      - sentinel_state:/app/state
    mem_limit: 1200m
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/state/telegram_bot_last_cycle'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<180 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build: .
    container_name: dashboard
    restart: always
    command: streamlit run dashboard.py
    ports:
      - "8501:8501"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    mem_limit: 1200m
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import http.client,sys; c=http.client.HTTPConnection('127.0.0.1',8501,timeout=5); c.request('GET','/_stcore/health'); sys.exit(0 if c.getresponse().status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  risk-monitor:
    build: .
    container_name: risk-monitor
    restart: unless-stopped
    command: python risk_monitor.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
      - sentinel_state:/app/state
    mem_limit: 1200m
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/state/risk_monitor_last_cycle'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<720 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - telegram-bot

  reporting-service:
    build: .
    container_name: reporting-service
    restart: unless-stopped
    command: python report_scheduler.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
      - sentinel_state:/app/state
    mem_limit: 1200m
    labels:
      - "autoheal=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/state/report_scheduler_last_cycle'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<150 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - telegram-bot

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  sentinel_state:
    driver: local
