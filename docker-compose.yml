services:
  sentinel-bot:
    build: .
    container_name: sentinel-bot
    restart: always
    command: python3 main.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  telegram-bot:
    build: .
    container_name: telegram-bot
    restart: always
    command: python3 telegram_bot_secure_runner.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build: .
    container_name: dashboard
    restart: always
    command: streamlit run dashboard.py
    ports:
      - "8501:8501"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  risk-monitor:
    build: .
    container_name: risk-monitor
    restart: unless-stopped
    command: python risk_monitor.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
      - sentinel_state:/app/state
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import risk_monitor"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - telegram-bot

  reporting-service:
    build: .
    container_name: reporting-service
    restart: unless-stopped
    command: python report_scheduler.py
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/app
    mem_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import report_scheduler"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - telegram-bot

volumes:
  sentinel_state:
    driver: local
