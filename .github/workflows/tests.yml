name: Sentinel Tests

on:
  pull_request:
  push:
    branches:
      - main
      - sentinel-audit-tests-hardening
      - "claude/**"

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          TELEGRAM_BOT_TOKEN: "ci-test-token"
          TELEGRAM_ADMIN_ID: "12345"
          SUPABASE_URL: "https://ci-test.supabase.co"
          SUPABASE_KEY: "ci-test-key"
          DEV_PIN: "0000"
